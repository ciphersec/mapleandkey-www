<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 600" width="1050" height="600" role="img" aria-label="Maple &amp; Key — business card (back)">
  <title>Maple &amp; Key — Business card (back)</title>

  <!-- Ink background -->
  <rect width="1050" height="600" fill="#1d1916"/>

  <!-- ============================================================
       LEFT half: leaf + wordmark + tagline
       ============================================================ -->
  <g transform="translate(280 220)">
    <g transform="scale(5)">
      <path d="M 0 -18 L 5 -10 L 15 -10 L 11 -2 L 19 4 L 6 7 L 0 15 L -6 7 L -19 4 L -11 -2 L -15 -10 L -5 -10 Z"
            fill="#a23a2a"/>
      <rect x="-1.2" y="14" width="2.4" height="12" rx="1.2" fill="#a23a2a"/>
    </g>
  </g>

  <text x="280" y="410" text-anchor="middle"
        font-family="'Playfair Display', Georgia, serif"
        font-size="42" font-weight="500" fill="#faf7f0" letter-spacing="5">MAPLE &amp; KEY</text>

  <text x="280" y="450" text-anchor="middle"
        font-family="Inter, -apple-system, sans-serif"
        font-size="12" fill="#b08a3e" letter-spacing="3" font-weight="500">PROPERTY · PORTAL · PEACE OF MIND</text>

  <text x="280" y="500" text-anchor="middle"
        font-family="Inter, -apple-system, sans-serif"
        font-size="13" fill="#8a7e72" letter-spacing="2" font-weight="400">mapleandkey.com</text>

  <!-- Subtle vertical divider between brand side and QR side -->
  <line x1="580" y1="120" x2="580" y2="480" stroke="#3a3530" stroke-width="1"/>

  <!-- ============================================================
       RIGHT half: QR code with "Scan to save contact" label
       ============================================================ -->
  <!-- White tile behind QR for max scanning contrast -->
  <rect x="680" y="135" width="280" height="280" rx="14" fill="#faf7f0"/>
  <image href="business-card-qr.png" x="700" y="155" width="240" height="240"/>

  <text x="820" y="450" text-anchor="middle"
        font-family="Inter, -apple-system, sans-serif"
        font-size="13" fill="#faf7f0" letter-spacing="2" font-weight="600">SCAN TO SAVE CONTACT</text>

  <text x="820" y="475" text-anchor="middle"
        font-family="Inter, -apple-system, sans-serif"
        font-size="11" fill="#8a7e72" letter-spacing="1.5" font-weight="400">phone · email · website</text>
</svg>
