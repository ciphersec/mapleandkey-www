<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Maple &amp; Key icon">
  <title>Maple &amp; Key</title>

  <!-- Background tile (rounded ink square — like the marketing-site favicon) -->
  <rect width="200" height="200" rx="36" fill="#1d1916"/>

  <!-- Maple leaf, geometric 5-lobe in maple-red, with a key-bow ring at the top -->
  <g transform="translate(100 100)">
    <!-- Decorative key ring crown at the very top of the leaf (turns the leaf into a key motif) -->
    <circle cx="0" cy="-72" r="11" fill="none" stroke="#a23a2a" stroke-width="5"/>

    <!-- Stylized maple leaf below the ring. Five lobes, symmetric. -->
    <path d="
      M 0 -55
      L 8 -28  L 30 -36  L 22 -10
      L 52 -10  L 36 8   L 60 22
      L 30 24  L 38 50
      L 14 30  L 10 60
      L 0 42
      L -10 60  L -14 30
      L -38 50  L -30 24
      L -60 22  L -36 8   L -52 -10
      L -22 -10 L -30 -36  L -8 -28
      Z" fill="#a23a2a" stroke="#a23a2a" stroke-width="1" stroke-linejoin="round"/>

    <!-- Tiny key tooth — small notch on the right of the stem to suggest a key shape -->
    <rect x="2" y="48" width="9" height="4" rx="1" fill="#a23a2a"/>
    <rect x="2" y="56" width="6" height="4" rx="1" fill="#a23a2a"/>

    <!-- Stem (acts as both the leaf stem AND the key shaft) -->
    <rect x="-2" y="42" width="4" height="32" rx="2" fill="#a23a2a"/>
  </g>
</svg>
