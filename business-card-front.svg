<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 600" width="1050" height="600" role="img" aria-label="Maple &amp; Key — business card (front)">
  <title>Maple &amp; Key — Business card (front)</title>

  <!-- Paper background -->
  <rect width="1050" height="600" fill="#faf7f0"/>

  <!-- ============================================================
       Header strip: maple leaf + wordmark
       ============================================================ -->
  <g transform="translate(80 95)">
    <g transform="scale(2.6)">
      <path d="M 16 3 L 18 8 L 23 7 L 21 12 L 27 15 L 19 17 L 16 22 L 13 17 L 5 15 L 11 12 L 9 7 L 14 8 Z"
            fill="#a23a2a"/>
      <rect x="15.4" y="22" width="1.2" height="6" rx="0.6" fill="#a23a2a"/>
    </g>
  </g>

  <text x="180" y="120" font-family="'Playfair Display', Georgia, serif"
        font-size="46" font-weight="500" fill="#1d1916" letter-spacing="-0.5">
    Maple <tspan fill="#a23a2a" font-style="italic" font-weight="400">&amp;</tspan> Key
  </text>

  <!-- Divider line -->
  <line x1="80" y1="200" x2="970" y2="200" stroke="#e3dcce" stroke-width="1.5"/>

  <!-- ============================================================
       Person: name + title
       ============================================================ -->
  <text x="80" y="280" font-family="'Playfair Display', Georgia, serif"
        font-size="44" font-weight="500" fill="#1d1916" letter-spacing="-0.3">Mano Nathan</text>

  <text x="80" y="318" font-family="Inter, -apple-system, sans-serif"
        font-size="17" font-weight="500" fill="#8a7e72" letter-spacing="3">OPERATOR</text>

  <!-- ============================================================
       Contact column
       ============================================================ -->
  <g font-family="Inter, -apple-system, sans-serif" font-size="22" fill="#1d1916">
    <text x="80" y="405">
      <tspan font-weight="500" fill="#a23a2a">✉</tspan>
      <tspan dx="14">info@mapleandkey.com</tspan>
    </text>
    <text x="80" y="448">
      <tspan font-weight="500" fill="#a23a2a">☎</tspan>
      <tspan dx="14">(647) 765-7066</tspan>
    </text>
    <text x="80" y="491">
      <tspan font-weight="500" fill="#a23a2a">⌂</tspan>
      <tspan dx="14">mapleandkey.com</tspan>
    </text>
  </g>

  <!-- Tagline -->
  <text x="970" y="565" text-anchor="end"
        font-family="Inter, -apple-system, sans-serif"
        font-size="11" fill="#8a7e72" letter-spacing="2.5" font-weight="500">PROPERTY MANAGEMENT · WITHOUT THE CHAOS</text>
</svg>
